version: '3.9'

services:
  account-service:
    container_name: account-service
    image: ciganov-net/account-service:dev
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env.production.local
    expose:
      - '9103'
    volumes:
      - ../logs/account:/var/log/services/account
    networks:
      - ciganov-net

networks:
  ciganov-net:
    external: true
